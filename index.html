<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agents templates</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1020;
        --card: #121a2f;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --primary: #60a5fa;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --card: #ffffff;
          --text: #0f172a;
          --muted: #475569;
          --primary: #2563eb;
        }
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      h1 {
        margin: 0 0 8px;
      }
      .meta {
        color: var(--muted);
        margin-bottom: 16px;
      }
      .controls {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #334155;
        background: var(--card);
        color: var(--text);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 12px;
      }
      .name {
        font-weight: 700;
        margin-bottom: 4px;
      }
      .job {
        color: var(--muted);
        font-size: 0.95rem;
        margin-bottom: 8px;
      }
      .line {
        margin: 4px 0;
        font-size: 0.9rem;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid #334155;
        color: var(--primary);
        font-size: 0.8rem;
      }
      a {
        color: var(--primary);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>agents templates</h1>
      <div class="meta" id="meta">Loading...</div>
      <div class="controls">
        <input id="search" placeholder="Search by name / job / model / file" />
      </div>
      <div class="grid" id="list"></div>
    </main>
    <script>
      const metaEl = document.getElementById("meta");
      const listEl = document.getElementById("list");
      const searchEl = document.getElementById("search");
      let allTemplates = [];

      function escapeHtml(input) {
        return String(input)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function render(items) {
        if (!items.length) {
          listEl.innerHTML = "<div class='meta'>No templates found.</div>";
          return;
        }
        listEl.innerHTML = items
          .map((t) => {
            const soul = t.soul || {};
            const style = Array.isArray(soul.style) ? soul.style.join(", ") : "";
            return `
              <article class="card">
                <div class="name">${escapeHtml(t.name || "")}</div>
                <div class="job">${escapeHtml(t.jobTitle || "")}</div>
                <div class="line"><span class="pill">${escapeHtml(t.source || "")}</span></div>
                <div class="line"><strong>Model:</strong> ${escapeHtml(t.model || "")}</div>
                <div class="line"><strong>File:</strong> <a href="templates/${encodeURIComponent(t.file)}">${escapeHtml(t.file || "")}</a></div>
                <div class="line"><strong>MCP:</strong> ${t.mcpCount ?? 0} &nbsp; <strong>Skills:</strong> ${t.skillCount ?? 0}</div>
                <div class="line"><strong>Traits:</strong> ${escapeHtml((soul.traits || []).join(", "))}</div>
                <div class="line"><strong>Attitudes:</strong> ${escapeHtml((soul.attitudes || []).join(", "))}</div>
                <div class="line"><strong>Style:</strong> ${escapeHtml(style)}</div>
              </article>
            `;
          })
          .join("");
      }

      function applySearch() {
        const keyword = searchEl.value.trim().toLowerCase();
        if (!keyword) {
          render(allTemplates);
          return;
        }
        const filtered = allTemplates.filter((t) => {
          const soul = t.soul || {};
          const haystack = [
            t.file,
            t.name,
            t.jobTitle,
            t.model,
            t.source,
            ...(soul.traits || []),
            ...(soul.attitudes || []),
            ...(soul.style || [])
          ]
            .join(" ")
            .toLowerCase();
          return haystack.includes(keyword);
        });
        render(filtered);
      }

      searchEl.addEventListener("input", applySearch);

      fetch("./index.json")
        .then((r) => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then((data) => {
          allTemplates = Array.isArray(data.templates) ? data.templates : [];
          metaEl.textContent = `Templates: ${data.templateCount ?? allTemplates.length} | Generated: ${data.generatedAtUtc ?? "-"}`;
          render(allTemplates);
        })
        .catch((err) => {
          metaEl.textContent = `Failed to load index.json: ${err.message}`;
          listEl.innerHTML = "";
        });
    </script>
  </body>
</html>
