name: Generate Template Index

on:
  push:
    branches:
      - main
    paths:
      - "templates/**"
      - "jobTitle.json"
      - "scripts/generate-index.ps1"
      - ".github/workflows/generate-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate index.json
        shell: pwsh
        run: ./scripts/generate-index.ps1

      - name: Commit index.json if changed
        shell: bash
        run: |
          if git diff --quiet -- index.json; then
            echo "No index changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "chore: auto-update index.json"
          git push
